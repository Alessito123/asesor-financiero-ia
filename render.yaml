services:
  - type: web
    name: asesor-financiero-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_PATH
        value: models/best_model.keras
      - key: PREPROCESSOR_PATH
        value: models/preprocessor.joblib
      - key: MODEL_METADATA_PATH
        value: models/model_metadata.json
